
<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optimize | איליי שהרבני - ניהול קמפיינים פרימיום</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300..800&family=Gveret+Levin&family=Assistant:wght@200..800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#2D241E', // חום אספרסו עמוק
              secondary: '#FDFBF7', // שמנת בסיס
              accent: '#C5A059', // זהב
              brand: '#f4a677', // צבע המותג המדויק מה-PDF
              soft: '#F4EFE6',
            },
            fontFamily: {
              sans: ['"Assistant"', 'sans-serif'],
              heading: ['"Open Sans"', 'sans-serif'],
              accent: ['"Gveret Levin"', 'cursive'],
            },
            borderRadius: {
              '4xl': '2.5rem',
              '5xl': '3.5rem',
            },
            animation: {
              'marquee-rtl': 'marquee-rtl 40s linear infinite',
            },
            keyframes: {
              'marquee-rtl': {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(50%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Assistant', sans-serif;
        background-color: #FDFBF7;
        color: #2D241E;
        overflow-x: hidden;
        text-align: right;
      }
      .font-heading { font-family: 'Open Sans', sans-serif; }
      .font-accent { font-family: 'Gveret Levin', cursive; }
      .luxury-shadow { box-shadow: 0 20px 50px rgba(45, 36, 30, 0.05); }
      .brand-gradient { background: linear-gradient(135deg, #f4a677 0%, #ffc19a 100%); }
      
      .glass-light {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(244, 166, 119, 0.15);
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }
      
      .animate-float { animation: float 6s ease-in-out infinite; }

      /* Custom Marquee Animation for RTL - In dir="rtl", moving positive on X moves it to the left effectively if start is aligned right */
      .animate-marquee-rtl {
        animation: marquee-rtl 40s linear infinite;
        display: flex;
        width: max-content;
      }

      @keyframes marquee-rtl {
        0% { transform: translateX(0); }
        100% { transform: translateX(50%); }
      }

      /* RTL support for inputs and general layout */
      input::placeholder {
        text-align: right;
      }
      
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="overflow-x-hidden selection:bg-brand selection:text-white">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
